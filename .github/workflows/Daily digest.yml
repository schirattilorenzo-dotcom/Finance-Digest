name: Daily Finance Digest

on:
  schedule:
    # Runs at 09:00 UTC every day. GitHub Actions schedules always use UTC.
    # Adjust the hour to match when you want the email to land in your inbox.
    - cron: "0 09 * * *"
  workflow_dispatch:
    # Lets you click "Run workflow" in the Actions tab to test it on demand,
    # without waiting for the schedule.

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python daily_finance_digest.py
